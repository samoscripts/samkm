<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName test.php.local.com
    DocumentRoot /var/www

    <Directory /var/www>
        Options Indexes FollowSymLinks
        Require all granted
        AllowOverride All
        Order Allow,Deny
        Allow from All
    </Directory>

    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
</VirtualHost>

